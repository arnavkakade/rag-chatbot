version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ragchatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: ragchatbot-backend
    restart: unless-stopped
    env_file: [./backend/.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://raguser:ragpass@db:5432/ragdb
      DATABASE_SYNC_URL: postgresql://raguser:ragpass@db:5432/ragdb
    ports: ["8000:8000"]
    volumes: [./backend:/app, backend_storage:/app/storage]
    depends_on: { db: { condition: service_healthy } }

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: ragchatbot-frontend
    restart: unless-stopped
    ports: ["3000:80"]
    depends_on: [backend]

volumes:
  pgdata:
  backend_storage:
