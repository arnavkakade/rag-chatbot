version: "3.9"
# DB only for local dev: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ragchatbot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    ports: ["5432:5432"]
    volumes: [pgdata_dev:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata_dev:
